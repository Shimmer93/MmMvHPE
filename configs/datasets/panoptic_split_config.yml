# Legacy sequence-level random partition (kept for backward compatibility).
# Prefer `temporal_split` for per-sequence head/tail train/val partitioning.
random_split:
  ratio: 0.8
  random_seed: 0
  train_dataset:
    split: training
    sequences: null
    cameras: null
  val_dataset:
    split: validation
    sequences: null
    cameras: null

# Preferred Panoptic split mode: each sequence is split by frame order.
# train_dataset uses first floor(ratio * N) synchronized frames per sequence;
# val_dataset uses the remaining tail frames per sequence.
temporal_split:
  ratio: 0.8
  random_seed: 0
  train_dataset:
    split: training
    sequences: null
    subjects: null
    actions: null
    cameras: null
  val_dataset:
    split: validation
    sequences: null
    subjects: null
    actions: null
    cameras: null

cross_camera_split:
  train_dataset:
    split: training
    sequences: null
    subjects: null
    actions: null
    cameras: [kinect_002, kinect_003, kinect_004, kinect_005, kinect_006, kinect_008]
  val_dataset:
    split: validation
    sequences: null
    subjects: null
    actions: null
    cameras: [kinect_001, kinect_007, kinect_009, kinect_010]

cross_subject_split:
  # Explicit sequence-level partition for Panoptic configs that want whole-sequence
  # train/val splits (legacy behavior previously approximated by random_split).
  train_dataset:
    split: training
    sequences:
      - 161029_piano2
      - 161029_piano3
      - 170307_dance5
      - 170915_office1
      - 171026_cello3
      - 171026_pose1
      - 171026_pose2
      - 171204_pose1
      - 171204_pose2
      - 171204_pose4
      - 171204_pose5
      - 171204_pose6
    # Panoptic "subject" here is the sequence prefix before first underscore, e.g. 161029 in 161029_piano2.
    subjects: null
    actions: null
    cameras: null
  val_dataset:
    split: validation
    sequences:
      - 161029_flute1
      - 161029_piano4
      - 170407_office2
      - 171204_pose3
    subjects: null
    actions: null
    cameras: null
