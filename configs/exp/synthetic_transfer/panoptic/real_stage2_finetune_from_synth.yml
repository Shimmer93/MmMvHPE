strategy: ddp
benchmark: true
deterministic: false
pretrained: false
sync_batchnorm: false
clip_grad: null
precision: 16
epochs: &epochs 20
monitor: 'val_cam_pose_auc_30_rgb'
monitor_mode: 'max'
non_piano_seqs: &non_piano_seqs [161029_flute1, 170307_dance5, 170407_office2, 170915_office1, 171026_cello3, 171026_pose1, 171026_pose2, 171204_pose1, 171204_pose2, 171204_pose3, 171204_pose4, 171204_pose5, 171204_pose6]

train_dataset:
  name: 'PanopticPreprocessedDatasetV1'
  params:
    data_root: &data_root '/opt/data/panoptic_kinoptic_single_actor_cropped'
    unit: 'm'
    gt_unit: 'cm'
    output_num_joints: 19
    apply_to_new_world: true
    remove_root_rotation: true
    modality_names: ['rgb', 'depth']
    rgb_cameras: ['kinect_001', 'kinect_002', 'kinect_003', 'kinect_004', 'kinect_005', 'kinect_006', 'kinect_007', 'kinect_008', 'kinect_009', 'kinect_010']
    depth_cameras: ['kinect_001', 'kinect_002', 'kinect_003', 'kinect_004', 'kinect_005', 'kinect_006', 'kinect_007', 'kinect_008', 'kinect_009', 'kinect_010']
    rgb_cameras_per_sample: 1
    depth_cameras_per_sample: 1
    lidar_cameras_per_sample: 1
    convert_depth_to_lidar: true
    use_foreground_depth: true
    foreground_depth_subdir: 'depth_fg'
    split: 'train'
    split_config: 'configs/datasets/panoptic_split_config.yml'
    split_to_use: 'temporal_split'
    test_mode: false
    seq_len: 1
    seq_step: 1
    pad_seq: true
    causal: true
    use_all_pairs: false
    colocated: false
    sequence_allowlist: *non_piano_seqs
    strict_validation: true
val_dataset:
  name: 'PanopticPreprocessedDatasetV1'
  params:
    data_root: *data_root
    unit: 'm'
    gt_unit: 'cm'
    output_num_joints: 19
    apply_to_new_world: true
    remove_root_rotation: true
    modality_names: ['rgb', 'depth']
    rgb_cameras: ['kinect_001', 'kinect_002', 'kinect_003', 'kinect_004', 'kinect_005', 'kinect_006', 'kinect_007', 'kinect_008', 'kinect_009', 'kinect_010']
    depth_cameras: ['kinect_001', 'kinect_002', 'kinect_003', 'kinect_004', 'kinect_005', 'kinect_006', 'kinect_007', 'kinect_008', 'kinect_009', 'kinect_010']
    rgb_cameras_per_sample: 1
    depth_cameras_per_sample: 1
    lidar_cameras_per_sample: 1
    convert_depth_to_lidar: true
    use_foreground_depth: true
    foreground_depth_subdir: 'depth_fg'
    split: 'test'
    split_config: 'configs/datasets/panoptic_split_config.yml'
    split_to_use: 'temporal_split'
    test_mode: true
    seq_len: 1
    seq_step: 1
    pad_seq: true
    causal: true
    use_all_pairs: false
    colocated: false
    sequence_allowlist: *non_piano_seqs
    strict_validation: true
test_dataset:
  name: 'PanopticPreprocessedDatasetV1'
  params:
    data_root: *data_root
    unit: 'm'
    gt_unit: 'cm'
    output_num_joints: 19
    apply_to_new_world: true
    remove_root_rotation: true
    modality_names: ['rgb', 'depth']
    rgb_cameras: ['kinect_001', 'kinect_002', 'kinect_003', 'kinect_004', 'kinect_005', 'kinect_006', 'kinect_007', 'kinect_008', 'kinect_009', 'kinect_010']
    depth_cameras: ['kinect_001', 'kinect_002', 'kinect_003', 'kinect_004', 'kinect_005', 'kinect_006', 'kinect_007', 'kinect_008', 'kinect_009', 'kinect_010']
    rgb_cameras_per_sample: 1
    depth_cameras_per_sample: 1
    lidar_cameras_per_sample: 1
    convert_depth_to_lidar: true
    use_foreground_depth: true
    foreground_depth_subdir: 'depth_fg'
    split: 'test'
    split_config: 'configs/datasets/panoptic_split_config.yml'
    split_to_use: 'temporal_split'
    test_mode: true
    seq_len: 1
    seq_step: 1
    pad_seq: true
    causal: true
    use_all_pairs: false
    colocated: false
    sequence_allowlist: *non_piano_seqs
    strict_validation: true

optim_name: AdamW
optim_params:
  lr: &lr 0.0001
  weight_decay: 0.00001

sched_name: LinearWarmupCosineAnnealingLR
sched_params:
  warmup_epochs: 4
  max_epochs: *epochs
  warmup_start_lr: 0.00002
  eta_min: 0.00002

model_name: PanopticHPE
# Load the best real stage-1 finetuned checkpoint here or pass --checkpoint_path on CLI.
checkpoint_path: null
# Optionally warm-start the camera head from synthetic stage-2 pretraining.
pretrained_camera_head_path: null
backbone_rgb:
  name: 'TimmWrapper'
  eval: true
  params:
    model_name: 'vit_small_patch16_dinov3'
    pretrained: true
  has_temporal: false
backbone_lidar:
  name: 'MAMBA4DEncoder'
  eval: true
  params:
    radius: 0.1
    nsamples: 16
    spatial_stride: 32
    temporal_kernel_size: 3
    temporal_stride: 1
    emb_relu: false
    dim: 512
    mlp_dim: 1024
    num_classes: 0
    depth_mamba_inter: 5
    rms_norm: true
    drop_out_in_block: 0.0
    drop_path: 0.1
    depth_mamba_intra: 1
    intra: true
    mode: 'xyz'
  has_temporal: true
aggregator:
  name: 'TransformerAggregatorV4'
  eval: true
  params:
    input_dims: [384, 384, 512, 512]
    embed_dim: 512
    num_register_tokens: 4
    num_smpl_tokens: 0
    aa_order: ['single', 'cross_joint', 'gcn']
    aa_block_size: 1
    depth: 12
    block_type: 'Block'
    skeleton_type: 'smpl'
    num_heads: 8
    mlp_ratio: 2.0
    qkv_bias: true
    proj_bias: true
    ffn_bias: true
    qk_norm: true
    init_values: 0.01
keypoint_head:
  name: 'RegressionKeypointHeadV5'
  eval: true
  params:
    emb_size: 1024
    num_joints: 19
    num_register_tokens: 4
    num_smpl_tokens: 0
    max_modalities: 4
    last_n_layers: 4
    pose_encoding_type: "absT_quaR_FoV"
    losses: []
camera_head:
  name: 'KeypointCameraGCNHeadV5'
  params:
    num_joints: 19
    hidden_dim: 256
    num_layers: 4
    dropout: 0.1
    use_layernorm: true
    use_modality_embedding: true
    detach_inputs: true
    use_gt_ratio: 0.0
    num_iterations: 4
    pose_encoding_type: "absT_quaR_FoV"
    proj_loss_weight_rgb: 0.1
    proj_loss_weight_lidar: 0.1
    proj_loss_type: "l1"
    gcn_depth: 3
    input_2d_skeleton_format: "coco"
    input_3d_skeleton_format: "panoptic_coco19"
    train_branch: "both"
    losses:
      - name: 'CameraLoss'
        params:
          loss_type: 'l1'
          weights: [1.0, 1.0, 0]
        weight: 1.0

metrics:
  - name: 'MPJPE'
    params:
      use_smpl: false
      root_joint_idx: 0
  - name: 'PAMPJPE'
    params:
      use_smpl: false
      root_joint_idx: 0
  - name: 'CameraPoseAUC'
    params:
      modality: 'rgb'
      max_threshold: 30
    alias: 'CameraPoseAUC_rgb'
  - name: 'CameraPoseAUC'
    params:
      modality: 'lidar'
      max_threshold: 30
    alias: 'CameraPoseAUC_lidar'
  - name: 'CameraTranslationL2Error'
    params:
      modality: 'rgb'
    alias: 'CameraTransL2_rgb'
  - name: 'CameraTranslationL2Error'
    params:
      modality: 'lidar'
    alias: 'CameraTransL2_lidar'
  - name: 'CameraRotationAngleError'
    params:
      modality: 'rgb'
    alias: 'CameraRotAngle_rgb'
  - name: 'CameraRotationAngleError'
    params:
      modality: 'lidar'
    alias: 'CameraRotAngle_lidar'

train_pipeline: &train_pipeline
  - name: CameraParamToPoseEncoding
    params:
      pose_encoding_type: "absT_quaR_FoV"
  - name: PCCenterWithKeypoints
    params:
      center_type: 'mean'
      keys: ['input_lidar']
      keypoints_key: 'gt_keypoints'
  - name: VideoNormalize
    params:
      norm_mode: 'imagenet'
      keys: ['input_rgb']
  - name: PCPad
    params:
      num_points: 1024
      pad_mode: 'repeat'
      keys: ['input_lidar']
  - name: ToTensor
    params: null
val_pipeline: *train_pipeline
test_pipeline: *train_pipeline
vis_skl_format: 'panoptic_coco19'
vis_denorm_params:
  rgb_mean: [123.675, 116.28, 103.53]
  rgb_std: [58.395, 57.12, 57.375]
  depth_mean: [0.0]
  depth_std: [255.0]
