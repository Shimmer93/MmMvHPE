# --------------------------------------
# Metrics parameters
# --------------------------------------
metrics:
  - name: 'MPJPE'
    params:
      use_smpl: false
      root_joint_idx: 0
  - name: 'PAMPJPE'
    params:
      use_smpl: false
      root_joint_idx: 0
  - name: 'CameraPoseAUC'
    params:
      modality: 'rgb'
      max_threshold: 30
    alias: 'CameraPoseAUC_rgb'
  - name: 'CameraTranslationL2Error'
    params:
      modality: 'rgb'
    alias: 'CameraTransL2_rgb'
  - name: 'CameraRotationAngleError'
    params:
      modality: 'rgb'
    alias: 'CameraRotAngle_rgb'
# --------------------------------------
# Augmentation parameters
# --------------------------------------
train_pipeline: &train_pipeline
  - name: CameraParamToPoseEncoding
    params:
      pose_encoding_type: "absT_quaR_FoV"
  # - name: PCCenterWithKeypoints
  #   params:
  #     center_type: 'mean'
  #     keys: ['input_lidar']
  #     keypoints_key: 'gt_keypoints'
  - name: VideoNormalize
    params:
      norm_mode: 'imagenet'
      keys: ['input_rgb']
  # - name: PCPad
  #   params:
  #     num_points: 1024
  #     pad_mode: 'repeat'
  #     keys: ['input_lidar']
  - name: ToTensor
    params: null
val_pipeline: *train_pipeline
test_pipeline: *train_pipeline
vis_skl_format: 'panoptic_coco19'
vis_denorm_params:
  rgb_mean: [123.675, 116.28, 103.53]
  rgb_std: [58.395, 57.12, 57.375]
  depth_mean: [0.0]
  depth_std: [255.0]
