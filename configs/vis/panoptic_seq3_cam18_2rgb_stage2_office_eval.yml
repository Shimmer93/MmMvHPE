strategy: ddp
benchmark: true
deterministic: false
pretrained: false
sync_batchnorm: false
clip_grad: null
precision: 16
epochs: &epochs 10
monitor: 'val_cam_pose_auc_30_rgb'
monitor_mode: 'max'
office_seqs: &office_seqs [170407_office2, 170915_office1]

# --------------------------------------
# Dataset parameters
# --------------------------------------
train_dataset:
  name: 'PanopticPreprocessedDatasetV1'
  params:
    data_root: &data_root '/opt/data/panoptic_kinoptic_single_actor_cropped'
    unit: 'm'
    gt_unit: 'cm'
    output_num_joints: 19
    apply_to_new_world: true
    remove_root_rotation: true
    modality_names: ['rgb']
    rgb_cameras: ['kinect_001', 'kinect_008']
    depth_cameras: []
    rgb_cameras_per_sample: 2
    depth_cameras_per_sample: 0
    lidar_cameras_per_sample: 0
    convert_depth_to_lidar: true
    use_foreground_depth: true
    foreground_depth_subdir: 'depth_fg'
    split: 'train'
    split_config: 'configs/datasets/panoptic_split_config.yml'
    split_to_use: 'temporal_split'
    test_mode: false
    seq_len: 3
    seq_step: 1
    pad_seq: true
    causal: true
    use_all_pairs: false
    colocated: false
    sequence_allowlist: *office_seqs
    strict_validation: true
val_dataset:
  name: 'PanopticPreprocessedDatasetV1'
  params:
    data_root: *data_root
    unit: 'm'
    gt_unit: 'cm'
    output_num_joints: 19
    apply_to_new_world: true
    remove_root_rotation: true
    modality_names: ['rgb']
    rgb_cameras: ['kinect_001', 'kinect_008']
    depth_cameras: []
    rgb_cameras_per_sample: 2
    depth_cameras_per_sample: 0
    lidar_cameras_per_sample: 0
    convert_depth_to_lidar: true
    use_foreground_depth: true
    foreground_depth_subdir: 'depth_fg'
    split: 'test'
    split_config: 'configs/datasets/panoptic_split_config.yml'
    split_to_use: 'temporal_split'
    test_mode: true
    seq_len: 3
    seq_step: 1
    pad_seq: true
    causal: true
    use_all_pairs: false
    colocated: false
    sequence_allowlist: *office_seqs
    strict_validation: true
test_dataset:
  name: 'PanopticPreprocessedDatasetV1'
  params:
    data_root: *data_root
    unit: 'm'
    gt_unit: 'cm'
    output_num_joints: 19
    apply_to_new_world: true
    remove_root_rotation: true
    modality_names: ['rgb']
    rgb_cameras: ['kinect_001', 'kinect_008']
    depth_cameras: []
    rgb_cameras_per_sample: 2
    depth_cameras_per_sample: 0
    lidar_cameras_per_sample: 0
    convert_depth_to_lidar: true
    use_foreground_depth: true
    foreground_depth_subdir: 'depth_fg'
    split: 'test'
    split_config: 'configs/datasets/panoptic_split_config.yml'
    split_to_use: 'temporal_split'
    test_mode: true
    seq_len: 3
    seq_step: 1
    pad_seq: true
    causal: true
    use_all_pairs: false
    colocated: false
    sequence_allowlist: *office_seqs
    strict_validation: true
# --------------------------------------
# Optimizer parameters
# --------------------------------------
optim_name: AdamW
optim_params:
  lr: &lr 0.0001
  weight_decay: 0.00001
# --------------------------------------
# Learning rate scheduler parameters
# --------------------------------------
sched_name: LinearWarmupCosineAnnealingLR
sched_params:
  warmup_epochs: 4
  max_epochs: *epochs
  warmup_start_lr: 0.00002
  eta_min: 0.00002
# --------------------------------------
# Model parameters
# --------------------------------------
model_name: PanopticHPE
checkpoint_path: null
pretrained_camera_head_path: null
backbone_rgb:
  name: 'TimmWrapper'
  eval: true
  params:
    model_name: 'vit_small_patch16_dinov3'
    pretrained: true
  has_temporal: false
backbone_lidar:
  name: 'MAMBA4DEncoder'
  eval: true
  params:
    radius: 0.1
    nsamples: 16
    spatial_stride: 32
    temporal_kernel_size: 3
    temporal_stride: 1
    emb_relu: false
    dim: 512
    mlp_dim: 1024
    num_classes: 0
    depth_mamba_inter: 5
    rms_norm: true
    drop_out_in_block: 0.0
    drop_path: 0.1
    depth_mamba_intra: 1
    intra: true
    mode: 'xyz'
  has_temporal: true
aggregator:
  name: 'TransformerAggregatorV4'
  eval: true
  params:
    input_dims: [384, 384, 512, 512]
    embed_dim: 512
    num_register_tokens: 4
    num_smpl_tokens: 0
    aa_order: ['single', 'cross_joint', 'gcn']
    aa_block_size: 1
    depth: 12
    block_type: 'Block'
    skeleton_type: 'smpl'
    num_heads: 8
    mlp_ratio: 2.0
    qkv_bias: true
    proj_bias: true
    ffn_bias: true
    qk_norm: true
    init_values: 0.01
keypoint_head:
  name: 'RegressionKeypointHeadV5'
  eval: true
  params:
    emb_size: 1024
    num_joints: 19
    num_register_tokens: 4
    num_smpl_tokens: 0
    max_modalities: 4
    last_n_layers: 4
    pose_encoding_type: "absT_quaR_FoV"
    losses: []
camera_head:
  name: 'KeypointCameraGCNHeadV5'
  params:
    num_joints: 19
    hidden_dim: 256
    num_layers: 4
    dropout: 0.1
    use_layernorm: true
    use_modality_embedding: true
    detach_inputs: true
    use_gt_ratio: 0.0
    num_iterations: 4
    pose_encoding_type: "absT_quaR_FoV"
    proj_loss_weight_rgb: 0.1
    proj_loss_weight_lidar: 0.0
    proj_loss_type: "l1"
    gcn_depth: 3
    input_2d_skeleton_format: "coco"
    input_3d_skeleton_format: "panoptic_coco19"
    train_branch: "2d"
    losses:
      - name: 'CameraLoss'
        params:
          loss_type: 'l1'
          weights: [1.0, 1.0, 0]
        weight: 1.0
